<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐔 Сбор яиц</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- ХЕДЕР СО СЧЁТОМ, УРОВНЕМ И ЖИЗНЯМИ -->
        <div class="game-header">
            <div class="score">🥚 <span id="score">0</span></div>
            <div class="lives">❤️❤️❤️</div>
            <div class="level">Уровень <span id="level">1</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <!-- СТАРТОВЫЙ ЭКРАН -->
        <div id="startScreen" class="screen active">
            <h1>🐔 Сбор яиц</h1>
            <button id="startButton" class="btn">Начать игру</button>
        </div>
        
        <!-- ЭКРАН GAME OVER -->
        <div id="gameOverScreen" class="screen">
            <h2>😢 Игра окончена!</h2>
            <p>Ваш счёт: <span id="finalScore">0</span></p>
            <button id="restartButton" class="btn">Играть снова</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
